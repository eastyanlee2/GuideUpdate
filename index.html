<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide 上传助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #f0f0f2;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 920px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 660px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="date"],
    input[type="url"] {
      width: 100%;
      padding: 8px 11px;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 13.5px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    input:focus {
      border-color: #7c3aed;
      background: #fff;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .output-area {
      width: 100%;
      min-height: 280px;
      padding: 14px;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      font-size: 13.5px;
      line-height: 1.85;
      resize: vertical;
      font-family: inherit;
      outline: none;
      color: #222;
      background: #fafafa;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .copy-btn:hover { background: #6d28d9; }
    .copy-btn:active { transform: scale(0.98); }
    .copy-btn.copied { background: #059669; }

    .hint {
      font-size: 11.5px;
      color: #aaa;
      margin-top: 5px;
    }

    .hero-type-toggle {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .toggle-option {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      background: #fafafa;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .toggle-option:has(input:checked) {
      border-color: #7c3aed;
      background: #f5f3ff;
      color: #7c3aed;
    }

    .toggle-option input { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Guide 上传助手</h1>

    <div class="layout">
      <!-- 左栏：输入 -->
      <div class="card">
        <div class="card-title">填写信息</div>

        <div class="field">
          <label>Slug</label>
          <input id="slug" type="text" placeholder="photo-to-3d-printable-model">
          <p class="hint">下方 CDN 路径和 Cover 文件名均自动生成，可手动改。</p>
        </div>

        <div class="field">
          <label>Date</label>
          <input id="date" type="date">
        </div>

        <div class="field">
          <label>CDN 文件夹（Cover &amp; 配图）</label>
          <input id="img-folder" type="text" placeholder="photo-to-3d-printable-model">
        </div>

        <div class="field">
          <label>Cover 图文件名</label>
          <input id="cover" type="text" placeholder="slug-cover.webp">
        </div>

        <div class="field">
          <label>Hero 类型</label>
          <div class="hero-type-toggle">
            <label class="toggle-option"><input type="radio" name="hero-type" value="video" checked> 视频</label>
            <label class="toggle-option"><input type="radio" name="hero-type" value="image"> 图片</label>
          </div>
        </div>

        <div id="hero-video-fields">
          <div class="field">
            <label>Hero YouTube URL</label>
            <input id="youtube" type="url" placeholder="https://www.youtube.com/watch?v=...">
          </div>
          <div class="field">
            <label>视频上传日期</label>
            <input id="hero-video-upload-date" type="date">
          </div>
          <div class="field">
            <label>视频长度</label>
            <input id="hero-video-duration" type="text" placeholder="5:30">
          </div>
        </div>

        <div id="hero-image-fields" style="display:none">
          <div class="field">
            <label>Banner 文件名</label>
            <input id="hero-banner" type="text" value="banner.webp">
          </div>
        </div>

        <div class="field">
          <label>作者名</label>
          <input id="author" type="text" placeholder="Sally">
        </div>

        <div class="field">
          <label>Hero 按钮文字</label>
          <input id="btn-text" type="text" value="Convert Image to 3D">
        </div>

        <div class="field">
          <label>Hero 按钮链接</label>
          <input id="btn-url" type="url" value="https://www.meshy.ai/workspace">
        </div>
      </div>

      <!-- 右栏：输出 -->
      <div class="card">
        <div class="card-title">生成结果</div>
        <textarea id="output" class="output-area" readonly></textarea>
        <button class="copy-btn" id="copyBtn" onclick="copyOutput()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制
        </button>
      </div>
    </div>
  </div>

  <script>
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function formatDate(val) {
      if (!val) return '';
      const [y, m, d] = val.split('-').map(Number);
      return `${MONTHS[m - 1]} ${d}, ${y}`;
    }

    function generate() {
      const slug      = document.getElementById('slug').value.trim();
      const date      = formatDate(document.getElementById('date').value);
      const imgFolder = document.getElementById('img-folder').value.trim() || slug;
      const cover     = document.getElementById('cover').value.trim() || (slug ? `${slug}-cover.webp` : '');
      const heroType        = document.querySelector('input[name="hero-type"]:checked').value;
      const youtube         = document.getElementById('youtube').value.trim();
      const videoUploadDate = formatDate(document.getElementById('hero-video-upload-date').value);
      const videoDuration   = document.getElementById('hero-video-duration').value.trim();
      const heroBanner      = document.getElementById('hero-banner').value.trim();
      const author    = document.getElementById('author').value.trim();
      const btnText   = document.getElementById('btn-text').value.trim();
      const btnUrl    = document.getElementById('btn-url').value.trim();

      const lines = [
        `1.这篇文章的slug是 ${slug}`,
        `2.发布日期：${date}`,
        `3.cover图在cdn的位置：https://cdn.meshy.ai/tutorials/${imgFolder}/${cover}`,
        `4.配图已上传至cdn：https://cdn.meshy.ai/tutorials/${imgFolder} 文件夹下，与md里的图片名大小写完全一致。`,
      ];

      if (heroType === 'video') {
        lines.push(`5.hero YouTube视频网址：${youtube}`);
        lines.push(`6.视频上传日期：${videoUploadDate}`);
        lines.push(`7.视频长度：${videoDuration}`);
      } else {
        lines.push(`5.hero图片在cdn的位置：https://cdn.meshy.ai/tutorials/${imgFolder}/${heroBanner}`);
      }

      let n = lines.length + 1;
      lines.push(`${n++}.作者名：${author}，聚合页显示Meshy AI即可。`);
      lines.push(`${n++}.Hero部分的按钮修改为${btnText}，链接为 ${btnUrl}`);
      lines.push(`${n++}.文章全文及Meta Title、Meta Description已使用markdown格式添加至附件。`);

      document.getElementById('output').value = lines.join('\n');
    }

    let coverEdited = false;
    let folderEdited = false;

    document.getElementById('slug').addEventListener('input', function () {
      const val = this.value.trim();
      if (!folderEdited) {
        document.getElementById('img-folder').value = val;
      }
      if (!coverEdited) {
        document.getElementById('cover').value = val ? `${val}-cover.webp` : '';
      }
      generate();
    });

    document.getElementById('img-folder').addEventListener('input', function () {
      const slug = document.getElementById('slug').value.trim();
      folderEdited = this.value !== slug;
      generate();
    });

    document.getElementById('cover').addEventListener('input', function () {
      const slug = document.getElementById('slug').value.trim();
      coverEdited = this.value !== `${slug}-cover.webp`;
      generate();
    });

    ['date', 'youtube', 'hero-video-upload-date', 'hero-video-duration', 'hero-banner', 'author', 'btn-text', 'btn-url'].forEach(id => {
      document.getElementById(id).addEventListener('input', generate);
    });

    document.querySelectorAll('input[name="hero-type"]').forEach(radio => {
      radio.addEventListener('change', function () {
        const isVideo = this.value === 'video';
        document.getElementById('hero-video-fields').style.display = isVideo ? '' : 'none';
        document.getElementById('hero-image-fields').style.display = isVideo ? 'none' : '';
        generate();
      });
    });

    function copyOutput() {
      const text = document.getElementById('output').value;
      if (!text.trim()) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制`;
          btn.classList.remove('copied');
        }, 2500);
      });
    }

    generate();
  </script>
</body>
</html>
